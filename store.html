<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAĞAZA | RTX SOFTWARE</title>
    <style>
        :root {
            --bg-base: #0a0a0c;
            --bg-surface: rgba(18, 20, 24, 0.75);
            --bg-surface-hover: rgba(22, 25, 30, 0.9);
            --primary: #76b900;
            --primary-hover: #8be500;
            --text-main: #f0f0f5;
            --text-muted: #8b92a5;
            --border-light: rgba(255, 255, 255, 0.08);
            --glow: rgba(118, 185, 0, 0.3);
            --font-main: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font-main); scroll-behavior: smooth; }

        body {
            background-color: var(--bg-base); color: var(--text-main); overflow-x: hidden; position: relative;
        }

        body::before {
            content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background-image: linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 40px 40px; pointer-events: none; z-index: -1;
        }

        header {
            display: flex; justify-content: space-between; align-items: center; padding: 1.2rem 5%;
            background: rgba(10, 10, 12, 0.8); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border-light);
        }

        .logo { font-size: 1.6rem; font-weight: 800; letter-spacing: 2px; color: #fff; }
        .logo span { color: var(--primary); }
        nav a { color: var(--text-muted); text-decoration: none; margin-left: 2rem; font-size: 0.95rem; font-weight: 500; transition: 0.2s; }
        nav a:hover, nav a.active { color: var(--text-main); }

        /* MAĞAZA (GAMES GRID) */
        .store-container { padding: 4rem 5%; max-width: 1400px; margin: 0 auto; }
        .section-title { font-size: 2.5rem; font-weight: 800; text-transform: uppercase; margin-bottom: 3rem; text-align: left; letter-spacing: 1px; }
        .section-title span { color: var(--primary); }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 2.5rem; }

        .card {
            background: var(--bg-surface); border: 1px solid var(--border-light);
            border-radius: 12px; overflow: hidden; backdrop-filter: blur(10px);
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
            position: relative; cursor: pointer; display: flex; flex-direction: column;
        }

        .card:hover {
            transform: translateY(-6px); border-color: rgba(118, 185, 0, 0.4);
            box-shadow: 0 15px 35px rgba(0,0,0,0.6), 0 0 20px rgba(118, 185, 0, 0.1); background: var(--bg-surface-hover);
        }

        .card-img-wrapper {
            width: 100%; height: 200px; position: relative; overflow: hidden;
            border-bottom: 1px solid var(--border-light);
        }

        .card-img-blur {
            position: absolute; top: -10%; left: -10%; width: 120%; height: 120%;
            background-size: cover; background-position: center; filter: blur(15px);
            opacity: 0.5; z-index: 0; transition: transform 0.5s ease;
        }

        .card-img {
            width: 100%; height: 100%; object-fit: contain; position: relative; z-index: 1;
            transition: transform 0.5s ease;
        }

        .card:hover .card-img, .card:hover .card-img-blur { transform: scale(1.08); }

        .card-img-overlay {
            position: absolute; bottom: 0; left: 0; right: 0; height: 50%; z-index: 2;
            background: linear-gradient(to top, var(--bg-surface-hover), transparent);
        }

        .card-body { padding: 1.5rem 1.8rem 2rem; flex-grow: 1; display: flex; flex-direction: column; }
        .game-title { font-size: 1.5rem; font-weight: 700; color: #fff; margin-bottom: 0.5rem; letter-spacing: 0.5px; }
        .card p { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 1.5rem; line-height: 1.5; flex-grow: 1; }

        .btn-view {
            align-self: flex-start; background: transparent; color: var(--text-main);
            border: 1px solid var(--border-light); padding: 0.6rem 1.5rem; border-radius: 6px;
            font-size: 0.9rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s;
        }
        .card:hover .btn-view { background: var(--primary); color: #000; border-color: var(--primary); }

        /* HİLE DETAYLARI - SPA (KARE KART TASARIMI) */
        #details-section { display: none; padding: 3rem 5%; max-width: 1400px; margin: 0 auto; }
        
        .top-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2.5rem; border-bottom: 1px solid var(--border-light); padding-bottom: 1.5rem; }
        #detail-title { font-size: 2.5rem; font-weight: 800; text-transform: uppercase; color: #fff; }

        .back-btn {
            display: inline-flex; align-items: center; background: transparent; color: var(--text-muted); padding: 8px 16px;
            border: 1px solid var(--border-light); border-radius: 6px; cursor: pointer; font-size: 0.95rem; font-weight: 500; transition: 0.2s;
        }
        .back-btn:hover { background: rgba(255,255,255,0.05); color: #fff; }

        #cheats-container {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 2rem;
        }

        .cheat-card-body {
            padding: 1.5rem; display: flex; flex-direction: column; flex-grow: 1; text-align: center;
        }

        .cheat-info h3 { font-size: 1.4rem; color: #fff; margin-bottom: 8px; font-weight: 700; }
        .cheat-info p { color: var(--text-muted); font-size: 0.95rem; line-height: 1.5; margin-bottom: 1.5rem; flex-grow: 1; }
        
        .cheat-price { font-size: 1.8rem; font-weight: 800; margin-bottom: 12px; display: block; color: var(--primary); }
        
        .btn-buy {
            display: block; background: var(--primary); color: #000; padding: 0.8rem 1rem;
            border-radius: 6px; text-decoration: none; font-weight: 700; font-size: 0.95rem; transition: 0.3s;
            text-transform: uppercase; letter-spacing: 0.5px; width: 100%;
        }
        .btn-buy:hover { background: var(--primary-hover); transform: translateY(-2px); box-shadow: 0 4px 15px rgba(118, 185, 0, 0.3); }

        footer { text-align: center; padding: 2rem; border-top: 1px solid var(--border-light); margin-top: 4rem; background: rgba(10, 10, 12, 0.5); backdrop-filter: blur(10px); }
        footer p { color: var(--text-muted); font-size: 0.9rem; }
    </style>
</head>
<body>

    <header>

        <nav>

        </nav>
    </header>
    <script>
        (function() {

            if (session) {

            } else {
                area.innerHTML = '<a href="login.html" style="margin-left:2rem;background:var(--primary);color:#000;padding:0.4rem 1rem;border-radius:6px;font-weight:700;text-decoration:none;font-size:0.9rem;">Giriş Yap</a>';

        function openGame(gameKey) {
            const game = gamesData[gameKey];
            document.getElementById('main-section').style.display = 'none';
            document.getElementById('details-section').style.display = 'block';
            window.scrollTo(0, 0);
            
            document.getElementById('detail-title').innerText = game.title + " HİLELERİ";
            
            const container = document.getElementById('cheats-container');
            container.innerHTML = ''; 
            
            game.cheats.forEach(cheat => {

                const cheatCard = document.createElement('div');
                cheatCard.className = 'card'; // Ana oyun kartı CSS'ini kullanarak tamamen aynı estetiği yaratır
                cheatCard.innerHTML = `
                    <div class="card-img-wrapper">
                        <div class="card-img-blur" style="background-image: url('${cheatImage}')"></div>

                container.appendChild(cheatCard);
            });

        function goBack(e) {
            if (e && document.getElementById('main-section').style.display !== 'none') return;
            document.getElementById('details-section').style.display = 'none';
            document.getElementById('main-section').style.display = 'block';
            window.scrollTo(0, 0);
        }
